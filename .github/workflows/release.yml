name: release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build server
        run: cargo build --release -p server

      - name: Build TUI
        run: cargo build --release -p tui

      - name: Archive binaries
        run: |
          mkdir -p dist
          cp target/release/server dist/simple-footie-server
          cp target/release/tui dist/simple-footie-tui
          cp README.md dist/
          cd dist && tar czf ../simple-footie-x86_64-unknown-linux-gnu.tar.gz .

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: |
            {
              "template": "# Changelog\n\n$UNCATEGORIZED",
              "categories": []
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ${{ steps.changelog.outputs.changelog }}
          files: |
            simple-footie-x86_64-unknown-linux-gnu.tar.gz
          generate_release_notes: true
          make_latest: true
